<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aimtune | Web Aim Test</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar" aria-label="게임 상태">
        <div>
          <p class="eyebrow">Aimtune</p>
          <h1>에임 테스트</h1>
        </div>
        <div class="topbar__status">
          <span id="modePill" class="status-pill">정밀</span>
          <span id="statePill" class="status-pill status-pill--live">대기</span>
        </div>
      </header>

      <aside class="panel controls" aria-label="테스트 설정">
        <section class="control-block">
          <h2>모드</h2>
          <div class="segmented" role="tablist" aria-label="모드 선택">
            <button class="segment is-active" type="button" data-mode="precision">정밀</button>
            <button class="segment" type="button" data-mode="burst">스피드</button>
            <button class="segment" type="button" data-mode="reflex">반응</button>
          </div>
        </section>

        <section class="control-block">
          <h2>시간</h2>
          <div class="duration-set" aria-label="테스트 시간">
            <button class="chip" type="button" data-duration="30">30초</button>
            <button class="chip is-active" type="button" data-duration="45">45초</button>
            <button class="chip" type="button" data-duration="60">60초</button>
          </div>
        </section>

        <section class="control-block">
          <div class="label-row">
            <h2>난이도</h2>
            <output id="difficultyValue" for="difficulty">5</output>
          </div>
          <input id="difficulty" type="range" min="1" max="10" value="5" />
        </section>

        <section class="control-block">
          <button id="startBtn" class="primary-action" type="button">테스트 시작</button>
          <button id="resetBtn" class="secondary-action" type="button">초기화</button>
        </section>
      </aside>

      <section class="arena-shell" aria-label="에임 테스트 경기장">
        <div class="arena-header">
          <div>
            <p class="eyebrow">현재 테스트</p>
            <h2 id="arenaTitle">정밀 조준</h2>
          </div>
          <strong id="timeValue" class="time-value">45.0</strong>
        </div>
        <div class="timer-track" aria-hidden="true">
          <span id="timerFill"></span>
        </div>
        <div id="arena" class="arena">
          <canvas id="aimCanvas" aria-label="클릭 타겟 영역"></canvas>
          <div id="screenOverlay" class="screen-overlay">
            <p class="eyebrow">Ready</p>
            <h2 id="overlayTitle">에임 테스트</h2>
            <div class="result-grid" aria-label="결과 요약">
              <div>
                <span>점수</span>
                <strong id="resultScore">0</strong>
              </div>
              <div>
                <span>정확도</span>
                <strong id="resultAccuracy">0%</strong>
              </div>
              <div>
                <span>평균 반응</span>
                <strong id="resultReaction">0ms</strong>
              </div>
            </div>
            <button id="overlayStart" class="primary-action" type="button">시작</button>
          </div>
        </div>
      </section>

      <aside class="panel stats" aria-label="실시간 기록">
        <section class="score-card">
          <span>점수</span>
          <strong id="scoreValue">0</strong>
        </section>

        <section class="metric-grid">
          <article class="metric">
            <span>정확도</span>
            <strong id="accuracyValue">0%</strong>
          </article>
          <article class="metric">
            <span>명중</span>
            <strong id="hitsValue">0</strong>
          </article>
          <article class="metric">
            <span>실패</span>
            <strong id="missesValue">0</strong>
          </article>
          <article class="metric">
            <span>연속</span>
            <strong id="streakValue">0</strong>
          </article>
          <article class="metric">
            <span>최고 연속</span>
            <strong id="bestStreakValue">0</strong>
          </article>
          <article class="metric">
            <span>평균 반응</span>
            <strong id="reactionValue">0ms</strong>
          </article>
        </section>

        <section class="history" aria-label="최근 명중 반응">
          <div class="label-row">
            <h2>최근 반응</h2>
            <span id="paceValue">0/min</span>
          </div>
          <div id="reactionBars" class="reaction-bars"></div>
        </section>
      </aside>
    </main>
  </body>
</html>
