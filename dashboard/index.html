<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0052cc" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18"/></svg>
      대시보드
    </div>
    <select id="projectSelect" title="프로젝트 선택" aria-label="프로젝트 선택"></select>
    <button id="newProjectBtn">+ 프로젝트</button>
    <input id="search" type="search" placeholder="검색…" aria-label="카드 검색">
    <select id="priorityFilter" title="우선순위 필터" aria-label="우선순위 필터">
      <option value="">우선순위 전체</option>
      <option value="high">High</option>
      <option value="med">Medium</option>
      <option value="low">Low</option>
    </select>
    <select id="labelFilter" title="라벨 필터" aria-label="라벨 필터">
      <option value="">라벨 전체</option>
    </select>
  </header>

  <main id="board" class="board"></main>

  <!-- 카드 상세/편집 모달 -->
  <div id="modal" class="modal-backdrop hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-label="카드 편집">
      <label>제목<input id="m-title" type="text"></label>
      <label>설명<textarea id="m-desc" rows="4"></textarea></label>
      <div class="row">
        <label>우선순위
          <select id="m-priority">
            <option value="low">Low</option>
            <option value="med">Medium</option>
            <option value="high">High</option>
          </select>
        </label>
        <label>마감일<input id="m-due" type="date"></label>
      </div>
      <label>라벨 (쉼표로 구분)<input id="m-labels" type="text" placeholder="예: 버그, 긴급"></label>
      <div class="modal-actions">
        <button id="m-delete" class="danger">삭제</button>
        <span class="spacer"></span>
        <button id="m-cancel">취소</button>
        <button id="m-save" class="primary">저장</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
